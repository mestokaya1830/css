<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{padding: 20px;}
    #main {
      display: flex;
      list-style: none;
    }
    #main li{
      min-width: 140px;
      position: relative;
    }
    #sub{
      display: none;
      position: absolute;
      top: 20px;
      left: 20px;
      list-style: none;
      z-index: 100;
    }
    #sub li{
      min-height: 20px;
      margin: 5px 0;
    }
    #main > li:hover #sub {
      display: block;
    }
  </style>
</head>
<body>
  <ul id="main">
    <li>
      <h2>Categories</h2>
      <ul id="sub">
        <li>Computers</li>
        <li>Phones</li>
      </ul>
    </li>

</body>
</html>
